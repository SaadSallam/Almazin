# =============================================================================
# Almazin App — Windows Build & Release
#
# Triggers:
#   - Push to main   → builds EXE, creates nightly Release with unique tag
#   - Tag v*.*.*     → builds EXE, creates versioned stable Release
#
# Output:
#   - windows-exe.zip uploaded as a Release asset
#   - Every push to main → downloadable EXE via Releases
# =============================================================================

name: Windows Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Git long paths (prevents "path too long" on Windows runners) ─────
      - name: Enable git long paths
        run: git config --system core.longpaths true

      # ── Flutter SDK ───────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        shell: pwsh
        run: flutter doctor -v

      # ── Enable Windows Desktop ───────────────────────────────────────────
      - name: Enable Windows Desktop support
        run: flutter config --enable-windows-desktop

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Get dependencies
        run: flutter pub get

      # ── Analyze ──────────────────────────────────────────────────────────
      - name: Analyze
        run: flutter analyze

      # ── Test ─────────────────────────────────────────────────────────────
      - name: Test
        run: flutter test

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build Windows release
        shell: pwsh
        run: |
          flutter build windows --release
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Flutter Windows build failed with exit code $LASTEXITCODE"
            exit 1
          }

      # ── Verify build output exists ───────────────────────────────────────
      - name: Verify build output
        shell: pwsh
        run: |
          $releasePath = "build/windows/x64/runner/Release"
          Write-Host "Checking for build output at: $releasePath"

          # List entire build/windows tree for debugging
          Write-Host "`n=== build/windows/ directory tree ==="
          Get-ChildItem -Path build/windows -Recurse -Directory | Select-Object -ExpandProperty FullName

          if (-not (Test-Path $releasePath)) {
            Write-Error "Windows build output missing at $releasePath — build failed silently"
            exit 1
          }

          Write-Host "`n=== Build output contents ==="
          Get-ChildItem -Path $releasePath | Select-Object Name, Length, LastWriteTime
          Write-Host "`nBuild verification passed ✓"

      # ── Package ──────────────────────────────────────────────────────────
      - name: Zip build output
        shell: pwsh
        run: |
          $sourcePath = "build/windows/x64/runner/Release"
          $zipPath = "windows-exe.zip"

          Write-Host "Packaging: $sourcePath → $zipPath"
          Compress-Archive -Path "$sourcePath\*" -DestinationPath $zipPath -Force

          if (-not (Test-Path $zipPath)) {
            Write-Error "Failed to create $zipPath"
            exit 1
          }

          $size = [math]::Round((Get-Item $zipPath).Length / 1MB, 2)
          Write-Host "Created $zipPath ($size MB) ✓"

      # ── Upload artifact (fallback if release creation fails) ──────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: almazin-windows-exe
          path: windows-exe.zip
          retention-days: 30

      # ── Version ──────────────────────────────────────────────────────────
      - name: Determine release version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -match "^refs/tags/v") {
            $tag = "${{ github.ref_name }}"
            $name = "Almazin App $tag"
            $prerelease = "false"
          } else {
            $date = Get-Date -Format "yyyyMMdd-HHmmss"
            $sha = "${{ github.sha }}".Substring(0, 7)
            $tag = "nightly-$date"
            $name = "Almazin App · Nightly · $sha · $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
            $prerelease = "true"
          }
          echo "tag=$tag"         >> $env:GITHUB_OUTPUT
          echo "name=$name"       >> $env:GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      # ── Release ─────────────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## Almazin App — Windows Build

            | Field | Value |
            |-------|-------|
            | Branch | `${{ github.ref_name }}` |
            | Commit | ${{ github.sha }} |
            | Build  | ${{ steps.version.outputs.name }} |

            ### 📥 Download
            - [`windows-exe.zip`](./windows-exe.zip) — Portable Windows executable

            ### ⚙️ Requirements
            - Windows 10+ (64-bit)
            - [Microsoft Visual C++ Redistributable](https://aka.ms/vcredist)
            - No installation required — unzip and run `almazin_app.exe`

            ### 💾 Local Data
            - Customer records, coffee prices, and blends stored locally via Hive
            - Use **Settings → Backup** to export/import JSON backups
          files: windows-exe.zip
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}

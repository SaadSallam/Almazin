# =============================================================================
# Almazin App — Windows Build & Release
#
# Triggers:
#   - Push to main   → nightly release (prerelease)
#   - Tag v*.*.*     → stable release (Latest)
#
# Output:
#   - Almazin-Setup-{version}.exe (installer)
#   - Almazin-App-{version}-windows-x64.zip (portable)
#   - Professional GitHub Release with structured notes
# =============================================================================

name: Windows Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Git long paths ───────────────────────────────────────────────────
      - name: Enable git long paths
        run: git config --system core.longpaths true

      # ── Flutter SDK ───────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        shell: pwsh
        run: flutter doctor -v

      # ── Enable Windows Desktop ───────────────────────────────────────────
      - name: Enable Windows Desktop support
        run: flutter config --enable-windows-desktop

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Get dependencies
        run: flutter pub get

      # ── Analyze (non-fatal: only real errors break CI) ────────────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # ── Test ─────────────────────────────────────────────────────────────
      - name: Test
        run: flutter test

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build Windows release
        shell: pwsh
        run: |
          flutter build windows --release
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Flutter Windows build failed with exit code $LASTEXITCODE"
            exit 1
          }

      # ── Verify build output ──────────────────────────────────────────────
      - name: Verify build output
        shell: pwsh
        run: |
          $releasePath = "build/windows/x64/runner/Release"

          Write-Host "`n=== build/windows/ directory tree ==="
          Get-ChildItem -Path build/windows -Recurse -Directory | Select-Object -ExpandProperty FullName

          if (-not (Test-Path $releasePath)) {
            Write-Error "Windows build output missing at $releasePath — build failed silently"
            exit 1
          }

          Write-Host "`n=== Build output contents ==="
          Get-ChildItem -Path $releasePath | Select-Object Name, Length, LastWriteTime
          Write-Host "`nBuild verification passed ✓"

      # ── Version & Artifact Names ─────────────────────────────────────────
      - name: Determine release version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"

          if ($ref -match "^refs/tags/v") {
            $tag = "${{ github.ref_name }}"
            $name = "Almazin App $tag"
            $artifactName = "Almazin-App-${tag}-windows-x64.zip"
            $setupName = "Almazin-Setup-${tag}.exe"
            $prerelease = "false"
            $releaseType = "Stable Release"
          } else {
            $date = Get-Date -Format "yyyyMMdd-HHmm"
            $sha = "${{ github.sha }}".Substring(0, 7)
            $tag = "nightly-$date"
            $name = "Almazin App · Nightly · $sha"
            $artifactName = "Almazin-App-nightly-$date-windows-x64.zip"
            $setupName = "Almazin-Setup-nightly-$date.exe"
            $prerelease = "true"
            $releaseType = "Nightly Build"
          }

          $buildTime = Get-Date -Format "yyyy-MM-dd HH:mm UTC"
          $zipPath = $artifactName

          # Package portable ZIP
          $sourcePath = "build/windows/x64/runner/Release"
          Compress-Archive -Path "$sourcePath\*" -DestinationPath $zipPath -Force

          if (-not (Test-Path $zipPath)) {
            Write-Error "Failed to create $zipPath"
            exit 1
          }

          $zipSize = [math]::Round((Get-Item $zipPath).Length / 1MB, 2)

          # Generate numeric installer version (MAJOR.MINOR.PATCH.REVISION)
          $utcNow = [DateTime]::UtcNow
          $timePart = $utcNow.TimeOfDay.TotalMilliseconds
          
          # Unique seed per build: Combine date and milliseconds
          $revisionBase = [int](($utcNow.DayOfYear * 1000 + $timePart) -as [int])
          
          # Ensure uniqueness with random padding (0-99)
          $revision = ($revisionBase + (Get-Random -Minimum 0 -Maximum 100)) % 65535
          
          if ($ref -match "^refs/tags/v") {
            # For stable releases: 1.0.0.REVISION
            $installerVersion = "1.0.0.$revision"
          } else {
            # For nightly: 0.1.0.REVISION
            $installerVersion = "0.1.0.$revision"
          }

          echo "tag=$tag"               >> $env:GITHUB_OUTPUT
          echo "name=$name"             >> $env:GITHUB_OUTPUT
          echo "artifact=$artifactName" >> $env:GITHUB_OUTPUT
          echo "setupName=$setupName"   >> $env:GITHUB_OUTPUT
          echo "zipPath=$zipPath"       >> $env:GITHUB_OUTPUT
          echo "zipSize=$zipSize"       >> $env:GITHUB_OUTPUT
          echo "buildTime=$buildTime"   >> $env:GITHUB_OUTPUT
          echo "releaseType=$releaseType" >> $env:GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          echo "installerVersion=$installerVersion" >> $env:GITHUB_OUTPUT

          Write-Host "`nPackaged: $zipPath ($zipSize MB) ✓"

      # ── Install Inno Setup ───────────────────────────────────────────────
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress --yes
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to install Inno Setup"
            exit 1
          }
          Write-Host "Inno Setup installed ✓"

      # ── Build Installer ──────────────────────────────────────────────────
      - name: Build Windows installer
        shell: pwsh
        run: |
          $installerVersion = "${{ steps.version.outputs.installerVersion }}"
          $releaseLabel = "${{ steps.version.outputs.tag }}"
          & installer/build-installer.ps1 -InstallerVersion $installerVersion -ReleaseLabel $releaseLabel
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Installer build failed"
            exit 1
          }

      # ── Rename installer output ──────────────────────────────────────────
      - name: Rename installer
        id: renameinstaller
        shell: pwsh
        run: |
          $setupName = "${{ steps.version.outputs.setupName }}"
          $outputDir = "installer/output"
          $setupExe = Get-ChildItem -Path $outputDir -Filter "Almazin-Setup-*.exe" | Select-Object -First 1

          if (-not $setupExe) {
            Write-Error "Installer output not found in $outputDir"
            exit 1
          }

          $destPath = Join-Path (Get-Location) $setupName
          Move-Item -Path $setupExe.FullName -Destination $destPath -Force

          $size = [math]::Round((Get-Item $destPath).Length / 1MB, 2)
          echo "setupPath=$setupName" >> $env:GITHUB_OUTPUT
          echo "setupSize=$size" >> $env:GITHUB_OUTPUT

          Write-Host "`nInstaller: $setupName ($size MB) ✓"

      # ── Generate Changelog ───────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $ref = "${{ github.ref_name }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $buildTime = "${{ steps.version.outputs.buildTime }}"
          $zipSize = "${{ steps.version.outputs.zipSize }}"
          $setupSize = "${{ steps.renameinstaller.outputs.setupSize }}"
          $releaseType = "${{ steps.version.outputs.releaseType }}"

          # Get recent commits
          $commits = git log --oneline -20 2>$null | Out-String

          # Build release notes
          $notes = @"
          ## $releaseType

          ### 📦 Build Info

          | Field | Value |
          |-------|-------|
          | Version | \`$tag\` |
          | Platform | Windows x64 |
          | Build Time | $buildTime |
          | Commit | \`$sha\` |
          | Branch | \`$ref\` |

          ### 📥 Downloads

          | File | Size | Description |
          |------|------|-------------|
          | **Almazin-Setup** | $setupSize MB | Installer — Start Menu, Desktop shortcut, auto-updates ready |
          | **Portable ZIP** | $zipSize MB | No installation — unzip and run |

          ### ⚠️ Requirements

          - Windows 10 or Windows 11 (64-bit)
          - [Microsoft Visual C++ Redistributable](https://aka.ms/vcredist)
          - No additional installation required

          ### 💾 Local Data & Backup

          - All data (customers, prices, blends) stored locally via Hive
          - Data is preserved during reinstall/upgrade
          - Use **Settings → Backup** to export/import JSON backups
          - No cloud sync — your data stays on your machine

          ### 📋 Recent Changes

          \`\`\`
          $commits
          \`\`\`
          "@

          # Write to file for release action
          $notes | Out-File -FilePath release-notes.md -Encoding utf8
          Write-Host "Release notes generated ✓"

      # ── Upload artifacts (fallback) ──────────────────────────────────────
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact }}
          path: ${{ steps.version.outputs.zipPath }}
          retention-days: 30

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.setupName }}
          path: ${{ steps.renameinstaller.outputs.setupPath }}
          retention-days: 30

      # ── Create Release ───────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: release-notes.md
          files: |
            ${{ steps.version.outputs.zipPath }}
            ${{ steps.renameinstaller.outputs.setupPath }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
